<!DOCTYPE html>
<!-- no global scroll-behavior: smooth — it fights ScrollTrigger's pin+scrub (use JS/GSAP scrollTo for nav) -->
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low Chee Fei | Software Developer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Devicon CDN (unpkg; jsdelivr is blocked on some networks). Only a fallback now — tech logos
         render from the committed local SVGs in /assets/tech-icons/ (run `npm run icons` to refresh). -->
    <link rel="stylesheet" type='text/css' href="https://unpkg.com/devicon@latest/devicon.min.css" />
    
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Typed.js -->
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'pop-bg': 'var(--bg-primary)',
              'pop-surface': 'var(--bg-surface)',
              'pop-surface-2': 'var(--bg-surface-2)',
              'pop-text-main': 'var(--text-main)',
              'pop-text-muted': 'var(--text-muted)',
              'pop-border': 'var(--border-color)',
              'pop-primary': 'var(--accent-primary)',
              'pop-secondary': 'var(--accent-secondary)',
            },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              display: ['"Bricolage Grotesque"', 'sans-serif'],
            },
            animation: {
              'blob': 'blob 10s infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
      }
    }
    </script>
  </head>
  <body class="bg-white text-[#14121A] antialiased overflow-x-clip selection:bg-[#FF2BD6] selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
