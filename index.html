<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low Chee Fei | Software Developer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Devicon CDN -->
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />

    <!-- GSAP, ScrollTrigger, SplitText, Typed.js and Lenis now load from npm via Vite
         (src/animations/*) — no CDN script tags. -->

    <!-- No-FOUC guard: mark the document animation-ready ONLY when motion is
         allowed and JS runs. CSS then hides [data-anim] elements pre-reveal.
         If JS is disabled or reduced-motion is on, the class is never added and
         all content stays visible. -->
    <script>
      (function () {
        try {
          var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          if (!reduce) document.documentElement.classList.add('anim-ready');
        } catch (e) {}
      })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'pop-bg': 'var(--bg-primary)',
              'pop-surface': 'var(--bg-surface)',
              'pop-surface-2': 'var(--bg-surface-2)',
              'pop-text-main': 'var(--text-main)',
              'pop-text-muted': 'var(--text-muted)',
              'pop-border': 'var(--border-color)',
              'pop-primary': 'var(--accent-primary)',
              'pop-secondary': 'var(--accent-secondary)',
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            animation: {
              'blob': 'blob 10s infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              }
            }
          }
        }
      }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-pop-bg text-pop-text-main antialiased overflow-x-hidden selection:bg-pop-primary selection:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
