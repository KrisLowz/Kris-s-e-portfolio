<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low Chee Fei | Software Developer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Devicon CDN (used only by the below-fold skills icons → load async so it
         doesn't block first paint). -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" /></noscript>

    <!-- GSAP, ScrollTrigger, SplitText, Typed.js, Lenis and Tailwind now build
         from npm via Vite (no CDN scripts / no runtime Tailwind compile). -->

    <!-- No-FOUC guard: mark the document animation-ready ONLY when motion is
         allowed and JS runs. CSS then hides [data-anim] elements pre-reveal.
         If JS is disabled or reduced-motion is on, the class is never added and
         all content stays visible. -->
    <script>
      (function () {
        try {
          var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          if (!reduce) document.documentElement.classList.add('anim-ready');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-pop-bg text-pop-text-main antialiased overflow-x-hidden selection:bg-pop-primary selection:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
